version: '3.8'

services:
  # ── 数据库 ──
  postgres:
    image: postgres:16
    container_name: agentic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agentic_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d agentic_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 后端 API ──
  backend:
    build: ./backend
    container_name: agentic_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://user:password@postgres:5432/agentic_db"
      LLM_API_KEY: "sk-7b2fbd6af6eb45e8a52d53470dd322fa"
    depends_on:
      postgres:
        condition: service_healthy

  # ── 前端 (nginx) ──
  frontend:
    build: ./frontend
    container_name: agentic_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
